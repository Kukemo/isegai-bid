<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — ISEKAI Guild Bid</title>
  <meta name="description" content="Login ke ISEKAI Guild Bid System"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo-row">
      <div class="login-logo"></div>
      <div>
        <div class="login-title">ISEKAI Guild Bid</div>
        <div class="login-sub">Bidding System · Auto Hold/Refund</div>
      </div>
    </div>

    <div class="login-desc">
      🛡️ Pilih nickname kamu untuk masuk. Tidak perlu password.
    </div>

    <label for="member">Nickname</label>
    <select id="member">
      <option disabled selected>— Memuat daftar member… —</option>
    </select>

    <button class="btn" id="loginBtn" onclick="login()">Masuk ke Dashboard</button>

    <div class="toast" id="toast"></div>

    <div class="login-footer">
      Sistem hanya untuk member guild yang terdaftar.<br/>
      <span style="color:rgba(255,255,255,0.2)">Made by ᯽ @irfaaan_jo</span>
    </div>
  </div>
</div>

<script>
function toast(type, msg) {
  const el = document.getElementById('toast');
  el.className = 'toast ' + (type === 'ok' ? 'ok' : 'err');
  el.textContent = msg;
  setTimeout(() => { el.className = 'toast'; el.textContent = ''; }, 3500);
}

async function loadMembers() {
  try {
    const members = await fetch('/api/members').then(r => r.json());
    const sel = document.getElementById('member');
    if (!members.length) {
      sel.innerHTML = '<option disabled>Tidak ada member terdaftar.</option>';
      return;
    }
    sel.innerHTML = members
      .sort((a, b) => a.nickname.localeCompare(b.nickname))
      .map(m => `<option value="${m.nickname}">${m.nickname}</option>`)
      .join('');
  } catch (e) {
    toast('err', 'Gagal memuat daftar member.');
  }
}

async function login() {
  const nickname = document.getElementById('member').value;
  const btn = document.getElementById('loginBtn');
  if (!nickname || nickname.startsWith('—')) return toast('err', 'Pilih nickname dulu.');

  btn.disabled = true;
  btn.classList.add('btn-loading');
  btn.textContent = 'Masuk';

  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname })
    });
    const data = await resp.json();
    if (!resp.ok) {
      toast('err', data.error || 'Gagal login.');
      return;
    }
    location.href = '/';
  } catch (e) {
    toast('err', 'Gagal koneksi ke server.');
  } finally {
    btn.disabled = false;
    btn.classList.remove('btn-loading');
    btn.textContent = 'Masuk ke Dashboard';
  }
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

loadMembers();
</script>
</body>
</html>
